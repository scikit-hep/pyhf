version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "github-actions"
      - "dependencies"
    reviewers:
      - "matthewfeickert"
    cooldown:
      default-days: 7

  # Ignore all pip dependencies to avoid PRs to update tests/constraints.txt
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
    cooldown:
      default-days: 7
